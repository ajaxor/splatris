<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#12101c" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Splatris</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;600&display=swap');

      :root {
        --bg-deep: #12101c;
        --bg-panel: #1c1930;
        --ink: #f2eefc;
        --ink-dim: #9d94c2;
        --splat: #ff3d68;
        --yellow: #ffd23f;
      }

      * { box-sizing: border-box; }

      html, body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--ink);
        font-family: 'Space Grotesk', sans-serif;
        background:
          radial-gradient(circle at 15% 10%, rgba(180, 107, 255, 0.14), transparent 40%),
          radial-gradient(circle at 85% 90%, rgba(63, 214, 232, 0.12), transparent 40%),
          var(--bg-deep);
        -webkit-tap-highlight-color: transparent;
      }

      main {
        width: min(100%, 480px);
        padding: 34px 24px 28px;
        text-align: center;
        border: 2px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background: rgba(28, 25, 48, 0.92);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
      }

      h1 {
        margin: 0;
        font-family: 'Press Start 2P', monospace;
        font-size: clamp(28px, 9vw, 46px);
        letter-spacing: 1px;
        text-shadow: 4px 4px 0 var(--splat), 8px 8px 0 rgba(0, 0, 0, 0.35);
      }

      .tagline {
        margin: 18px 0 30px;
        color: var(--ink-dim);
        font-size: 14px;
        letter-spacing: 0.5px;
      }

      nav {
        display: grid;
        gap: 14px;
      }

      a {
        display: block;
        padding: 16px 18px;
        border-radius: 9px;
        color: #1a1030;
        font-family: 'Press Start 2P', monospace;
        font-size: 12px;
        line-height: 1.35;
        text-decoration: none;
        background: var(--splat);
        box-shadow: 0 5px 0 #a4123a;
        transition: transform 0.05s ease, box-shadow 0.05s ease;
      }

      a.secondary {
        color: var(--ink);
        background: #2a2448;
        box-shadow: 0 5px 0 #151126;
      }

      a:active {
        transform: translateY(4px);
        box-shadow: 0 1px 0 #a4123a;
      }

      a.secondary:active {
        box-shadow: 0 1px 0 #151126;
      }

      .note {
        margin: 24px 0 0;
        color: var(--ink-dim);
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SPLATRIS</h1>
      <p class="tagline">run. jump. don’t get squished.</p>
      <nav aria-label="Game modes">
        <a href="splatris.html">Single Player</a>
        <a class="secondary" href="multiplayer.html">Multiplayer Demo</a>
      </nav>
      <p class="note">The multiplayer connection test is preserved as a separate demo.</p>
    </main>
  </body>
</html>
