<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#14182f" />
    <title>Splatris</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="Splatris demo game">
      <section class="hero">
        <p class="eyebrow">Mobile browser game starter</p>
        <h1>Splatris</h1>
        <p class="intro">Tap the falling blobs before they hit the floor. This tiny starter app is ready for GitHub Pages.</p>
      </section>

      <section class="hud" aria-live="polite">
        <div>
          <span class="label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="label">Lives</span>
          <strong id="lives">3</strong>
        </div>
      </section>

      <canvas id="game" width="360" height="520" aria-label="Game canvas"></canvas>

      <button id="start" type="button">Start game</button>
      <p id="status" class="status">Press start, then tap blobs to score.</p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
